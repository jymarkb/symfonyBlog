services:
  postgres:
    image: postgres:16-alpine
    container_name: symfonyblog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: blog_local
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog -d blog_local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
